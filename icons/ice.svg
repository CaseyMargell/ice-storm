<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <g id="fsp" fill="none" stroke-linecap="round">
      <line x1="0" y1="0" x2="0" y2="-13"/>
      <line x1="0" y1="-8" x2="-4" y2="-11.5"/>
      <line x1="0" y1="-8" x2="4" y2="-11.5"/>
    </g>
    <g id="flake">
      <use href="#fsp"/>
      <use href="#fsp" transform="rotate(60)"/>
      <use href="#fsp" transform="rotate(120)"/>
      <use href="#fsp" transform="rotate(180)"/>
      <use href="#fsp" transform="rotate(240)"/>
      <use href="#fsp" transform="rotate(300)"/>
    </g>
    <g id="flurry">
      <use href="#flake" transform="translate(24 32)"/>
      <use href="#flake" transform="translate(45 21) scale(0.6)"/>
      <use href="#flake" transform="translate(43 47) scale(0.5)"/>
    </g>
  </defs>
  <!-- white halo underneath keeps it legible on dark toolbars -->
  <g stroke="#ffffff" stroke-width="4.2" fill="none" stroke-linecap="round"><use href="#flurry"/></g>
  <!-- icy blue on top keeps it legible on light toolbars -->
  <g stroke="#2f8fd6" stroke-width="2.4" fill="none" stroke-linecap="round"><use href="#flurry"/></g>
</svg>
