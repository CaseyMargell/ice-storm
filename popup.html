<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    :root { color-scheme: light; }
    body {
      width: 240px;
      margin: 0;
      padding: 16px;
      font: 14px/1.4 system-ui, "Segoe UI", sans-serif;
      color: #0b3a52;
      background: linear-gradient(180deg, #eaf7ff, #c9ecff);
    }
    h1 {
      margin: 0 0 14px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.2px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .flake { font-size: 17px; }
    button#toggle {
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 12px;
      font: inherit;
      font-weight: 600;
      font-size: 15px;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.05s ease;
      box-shadow: 0 4px 12px rgba(43, 159, 224, 0.35);
    }
    button#toggle[data-mode="summon"]  { background: linear-gradient(180deg, #4cb8f5, #2b9fe0); }
    button#toggle[data-mode="dismiss"] { background: linear-gradient(180deg, #7a8aa3, #4a5a73); }
    button#toggle:hover:not(:disabled) { filter: brightness(1.06); }
    button#toggle:active:not(:disabled) { transform: translateY(1px); }
    button#toggle:disabled { background: #b8c4d2; cursor: default; box-shadow: none; }
    .hint {
      margin: 10px 2px 0;
      min-height: 16px;
      font-size: 12px;
      color: #4a6378;
      white-space: pre-line;
    }
    .ambient {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid rgba(43, 159, 224, 0.25);
      font-size: 13px;
      color: #2a4a60;
    }
    .ambient select {
      font: inherit;
      font-size: 13px;
      color: #0b3a52;
      padding: 5px 8px;
      border: 1px solid rgba(43, 159, 224, 0.5);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1><span class="flake">❄</span> Ice Storm</h1>
  <button id="toggle" data-mode="summon" type="button">❄&nbsp;&nbsp;Summon now</button>
  <div class="hint" id="hint"></div>
  <label class="ambient">
    <span>Random cameos</span>
    <select id="ambient">
      <option value="off">Off</option>
      <option value="frequent">Frequent · 5–10 min</option>
      <option value="often">Often · 10–30 min</option>
      <option value="occasionally">Occasionally · 30 min–3 hr</option>
      <option value="rarely">Rarely · 3 hr–2 days</option>
    </select>
  </label>
  <script src="popup.js"></script>
</body>
</html>
